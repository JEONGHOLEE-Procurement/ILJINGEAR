
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ILJIN Global | 유성기어 조달 관리</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#1a1a2e;color:#fff;
  min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;width:340px;}
.logo{font-size:2.5rem;margin-bottom:8px;}
h1{font-size:1.2rem;font-weight:700;letter-spacing:1px;margin-bottom:4px;}
.sub{font-size:0.78rem;color:#8a8a9a;margin-bottom:40px;}
.card{background:#16213e;border-radius:14px;padding:32px;border:1px solid rgba(255,255,255,.08);}
label{display:block;text-align:left;font-size:0.78rem;color:#8a8a9a;font-weight:600;margin-bottom:6px;}
input{width:100%;padding:12px 16px;background:#1a1a2e;border:1px solid rgba(255,255,255,.1);
  border-radius:8px;color:#fff;font-size:0.95rem;letter-spacing:3px;margin-bottom:20px;
  font-family:inherit;}
input:focus{outline:none;border-color:#00b4d8;}
button{width:100%;padding:13px;background:linear-gradient(135deg,#00b4d8,#0096c7);
  border:none;border-radius:8px;color:#fff;font-size:0.95rem;font-weight:700;
  cursor:pointer;transition:opacity .2s;}
button:hover{opacity:.85;}
.err{color:#e94560;font-size:0.8rem;margin-top:12px;min-height:18px;}
.footer{margin-top:24px;font-size:0.72rem;color:#8a8a9a;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">⚙</div>
  <h1>ILJIN Global</h1>
  <div class="sub">구매본부 선행구매팀 · 유성기어 조달 관리 시스템</div>
  <div class="card">
    <label>접근 코드</label>
    <input type="password" id="pw" placeholder="• • • • • •" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">로그인</button>
    <div class="err" id="err"></div>
  </div>
  <div class="footer">© 2026 ILJIN Global 선행구매팀</div>
</div>
<script>
function login(){
  const pw = document.getElementById('pw').value;
  if(pw === 'iljin2024'){
    sessionStorage.setItem('pg_auth','true');
    location.href = 'app.html';
  } else {
    document.getElementById('err').textContent = '접근 코드가 올바르지 않습니다.';
    document.getElementById('pw').value = '';
  }
}
</script>
</body>
</html>
